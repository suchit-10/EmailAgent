services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: email_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma

  backend:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    env_file:
      - backend/.env
    depends_on:
      - postgres
      - chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: infra/frontend.Dockerfile
    env_file:
      - frontend/.env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres-data:
  chroma-data:
